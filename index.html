<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set List Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@400;500;600&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Set List <span>Developer</span></h1>
  <div class="tagline">Blue Amsterdam Studio &bull; Nashville, Tenn.</div>
</header>

<main>
  <!-- ================= LEFT: SONG DATABASE ================= -->
  <section class="col-left">
    <h2>Song Database <span class="count" id="songCount"></span></h2>

    <form id="songForm" onsubmit="return false;">
      <label for="fTitle">Title</label>
      <input type="text" id="fTitle" autocomplete="off" placeholder="e.g. One Bar Left in Lubbock Tonight">

      <div class="row2">
        <div>
          <label>Tempo</label>
          <div class="seg" id="fTempo" role="group" aria-label="Tempo">
            <button type="button" data-v="up">Up</button>
            <button type="button" data-v="mid">Mid</button>
            <button type="button" data-v="down">Down</button>
          </div>
        </div>
        <div>
          <label>Original / Cover</label>
          <div class="seg" id="fType" role="group" aria-label="Original or cover">
            <button type="button" data-v="original">Orig.</button>
            <button type="button" data-v="cover">Cover</button>
          </div>
        </div>
      </div>

      <div class="row3">
        <div>
          <label for="fMin">Length (min)</label>
          <input type="number" id="fMin" min="0" max="30" placeholder="3">
        </div>
        <div>
          <label for="fSec">(sec)</label>
          <input type="number" id="fSec" min="0" max="59" placeholder="30">
        </div>
        <div>
          <label for="fIntro">Intro</label>
          <select id="fIntro">
            <option value="0">None</option>
            <option value="30">0:30</option>
            <option value="60">1:00</option>
            <option value="90">1:30</option>
            <option value="120">2:00</option>
          </select>
        </div>
      </div>

      <label for="fMood">Mood</label>
      <input type="text" id="fMood" list="moodList" autocomplete="off" placeholder="Rowdy, heartfelt, story...">
      <datalist id="moodList">
        <option value="Rowdy"><option value="Party"><option value="Heartfelt">
        <option value="Story"><option value="Ballad"><option value="Groove"><option value="Anthem">
      </datalist>

      <div class="check" style="margin-top:12px">
        <input type="checkbox" id="fStaple">
        <label for="fStaple">Staple — always include in every set</label>
      </div>

      <div class="btn-row">
        <button class="btn" id="btnSave">Add Song</button>
        <button class="btn ghost" id="btnCancel" style="display:none">Cancel Edit</button>
      </div>
    </form>

    <div class="song-list">
      <h2 style="margin-top:0">Catalog</h2>
      <div id="songList"></div>
    </div>
  </section>

  <!-- ================= RIGHT: GENERATOR + SETLIST ================= -->
  <section class="col-right">
    <div class="gen-panel">
      <h2>Build the Set</h2>
      <div class="row3">
        <div>
          <label for="gTarget">Set Length (min)</label>
          <input type="number" id="gTarget" min="5" max="240" value="45">
        </div>
        <div>
          <label for="gOriginals"># of Originals</label>
          <input type="number" id="gOriginals" min="0" max="50" placeholder="Any">
        </div>
        <div>
          <label for="gCovers"># of Covers</label>
          <input type="number" id="gCovers" min="0" max="50" placeholder="Any">
        </div>
      </div>
      <div class="row2" style="margin-top:10px">
        <div>
          <label for="gMood">Mood Filter</label>
          <select id="gMood"><option value="">All moods</option></select>
        </div>
      </div>
      <div class="check"><input type="checkbox" id="gIntros" checked><label for="gIntros">Count song intros toward total time</label></div>
      <div class="check"><input type="checkbox" id="gOpenUp" checked><label for="gOpenUp">Open with an up-tempo song</label></div>
      <div class="check"><input type="checkbox" id="gCloseUp" checked><label for="gCloseUp">Close with an up-tempo song</label></div>
      <div class="check"><input type="checkbox" id="gNoBB" checked><label for="gNoBB">Avoid back-to-back down-tempo songs</label></div>

      <div class="row2" style="margin-top:12px">
        <div><label for="gShow">Show / Venue</label><input type="text" id="gShow" placeholder="The Bluebird Cafe"></div>
        <div><label for="gDate">Date</label><input type="text" id="gDate" placeholder="July 4, 2026"></div>
      </div>

      <div class="btn-row">
        <button class="btn red" id="btnGenerate">Generate Set List</button>
        <button class="btn ghost" id="btnSaveSet">Save Set</button>
        <button class="btn ghost" id="btnPrint">Print</button>
        <button class="btn ghost" id="btnWord">Download for Word</button>
      </div>
      <div class="gen-status" id="genStatus"></div>
    </div>

    <!-- SAVED SETLISTS -->
    <div class="gen-panel" style="margin-bottom:26px">
      <h2>Saved Sets</h2>
      <div id="savedSetlists"></div>
    </div>

    <div class="setlist-card" id="setlistCard">
      <div class="tape"></div>
      <div class="sl-head">
        <div class="show" id="slShow">Set List</div>
        <div class="sub" id="slSub">Hit Generate to build a set</div>
      </div>
      <div id="slRows"></div>
      <div class="sl-total" id="slTotal" style="display:none">
        <span>Total Run Time <span id="slTargetNote"></span></span>
        <span class="clock" id="slClock">0:00</span>
      </div>
    </div>
  </section>
</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
